
<html>
    <button type="button" id="btnAllocate">Allocate</button>
    <button type="button" id="btnDeallocate">DeAllocate</button>
    <script>
       let arr;
       let arr2;
       let set =new WeakSet();
       //let set =new Set();
       document.getElementById('btnAllocate').addEventListener('click',function(){
           arr = new Array(1000);
           for(let i=0; i< 100;i++)
            {
                arr.push(new Array(100_000));
            }
            arr2 =arr;
            console.log('Allocated ');
            set.add(arr);
       });
       document.getElementById('btnDeallocate').addEventListener('click',function(){
           arr = null;
           arr2 =null;
           console.log('Deallocated ');
       });
    </script>    
</html>
