
<html>
  
    <script>
        class MySet
        {
            items = [];
            constructor(items)
            {
                this.items = this.removeDuplicate(items);
            }
            removeDuplicate(arr)
            {
                let items = [];
                for(const item of arr)
                {
                    if(!items.includes(item))
                    {
                        items.push(item);
                    }
                }
                return items;
            }
            add(item)
            {
                if(!this.items.includes(item))
                {
                    this.items.push(item);
                }
            }
            delete(item)
            {
                if(this.items.includes(item))
                {
                    let index= this.items.indexOf(item);
                    this.items.splice(index,1);
                }
            }
            get size()
            {
                return this.items.length;
            }
            clear()
            {
                this.items =[];
            }
        }
        let items =[1,2,2,1,3];
        let set =new MySet(items);
        set.add(3);
        set.add(4);
        set.delete(5);
        set.delete(4);
        console.log('set     ',set);
        console.log('size ',set.size);

        set.clear();
        console.log('set     ',set);
        console.log('size ',set.size);
    </script>    
</html>
