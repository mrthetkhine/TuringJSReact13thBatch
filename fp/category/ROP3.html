
<html>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/ramda/0.30.1/ramda.js"></script>
    <script>
        
        const Left =(x)=>({
    
            map(fn){
                return Left.of(x);
            },
            valueOf() { return x; },
            matchWith({left,right}) //obj = {left(),right()}
            {
                return left(x);
            }
        });     
        Left.of = Left;
        const Right =(x)=>({
          
            map(fn){
                return Right.of(fn(x));
            },
            valueOf() { return x; },
            matchWith({left,right}) //obj = {left(),right()}
            {
                return right(x);
            }
            
        });     
        Right.of = Right;
        function validate(obj)
        {
            if(obj.email && obj.email.includes('@'))
            {
                return Right.of(obj);
            }
            else
            {
                return Left.of('Invalid email');
            }
        }
        function sendEmail(obj)
        {
            console.log('send email to ',obj.email);
            return obj;
        }
        
        validate({
            name : "Jhon",
            email: "jhon@gmail.com"
        })
        .map(sendEmail)
        .matchWith({
           left:(x)=>console.log('Error ',x),
           right:(x)=>console.log('success ',x)     
        })
    </script>    
</html>
