
<html>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/ramda/0.30.1/ramda.js"></script>
    <script>
        
        const Left =(x)=>({
    
            map(fn){
                return Left.of(x);
            },
            valueOf() { return x; },
            matchWith({left,right}) //obj = {left(),right()}
            {
                return left(x);
            }
        });     
        Left.of = Left;
        const Right =(x)=>({
          
            map(fn){
                return Right.of(fn(x));
            },
            valueOf() { return x; },
            matchWith({left,right}) //obj = {left(),right()}
            {
                return right(x);
            }
            
        });     
        Right.of = Right;
        function div(a,b)
        {
            if(b===0)
            {
                return Left.of('Division by zero');
            }
            return Right.of(a/b);
        }
        div(10,0)
        .map(x=>x+1)
        .matchWith({
            left:(x)=>console.log('Error ',x),
            right:(x)=>console.log('Right ',x)
        });
    </script>    
</html>
