
<html>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/ramda/0.30.1/ramda.js"></script>
    <script>
        
        function div(a,b)
        {
            if(b===0)
            {
                throw new Error('Division by zero');
            }
            return a/b;
        }
        try
        {
            let result = div(10,0);
            console.log('Result ',result);
        }
        catch(e)
        {
            console.log('Error ',e);
        }
    </script>    
</html>
