<html>
    <script>
        const isEven = (n) => n%2 === 0;

        /*
        function not(fn)
        {
            return function(...args)
            {
                return !fn(...args);
            }
        }*/
        const not = (fn)=> (...args) => !fn(...args);
        const isOdd = not(isEven);

        let items = [1,2,3,4,5,6];
        console.log('Even ', items.filter(isEven));
        console.log('Odd ', items.filter(isOdd));
    </script>
</html>
