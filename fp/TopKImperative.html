
<html>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/ramda/0.30.1/ramda.js"></script>
   <script src="./funlib.js">   </script>
    <script>
        //top k
        //1-3, 2-2, 3-1
        let nums = [1,1,1,2,2,3], k = 2;
        //[1,2]

        let frequency = {};
        /*
        1-3,
        2-2,
        3-1
        */
       for(const item of nums)
       {
            if(frequency[item])
            {
                frequency[item]++;
            }
            else
            {
                frequency[item] = 1;
            }
       }
       console.log('frequency ',frequency);
       let arr = Object.entries(frequency);
       console.log('Arr ',arr);
       
       arr.sort( (a,b)=>a[1] - b[1]);
       console.log('Arr ',arr);
      
       arr = arr.map(item=>item[0]);
       console.log('Arr ',arr);
       arr = arr.slice(0,k);
       console.log('Arr ',arr);
    </script>    
</html>
