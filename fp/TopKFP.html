
<html>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/ramda/0.30.1/ramda.js"></script>
   <script src="./funlib.js">   </script>
    <script>
        //top k
        //1-3, 2-2, 3-1
        let nums = [1,1,1,2,2,3], k = 2;
        //[1,2]

        /*
        let frequency = R.countBy(R.identity,nums);
        console.log('frequency ',frequency);

        let arr = R.toPairs(frequency);
        console.log('Arr ',arr);

        let sorted = R.sort((a,b)=>b[1]-a[1],arr);
        console.log('Sorted ',sorted);

        let result = R.map(item=>item[0])(sorted);
        console.log('Result ',result);

        result = R.take(k,result);
        console.log('Result ',result);
        */
       let log = R.tap(console.log);
       let topK = R.pipe(
            R.countBy(R.identity),
            log,
            R.toPairs,
            log,
            R.sort((a,b)=>b[1]-a[1]),
            log,
            R.map(item=>item[0]),
            log,
            R.take(k)
       );
       console.log('TopK ',topK(nums));
       const sayX = x => console.log('x is ' + x);
       console.log( R.tap(sayX, 100))
    </script>    
</html>
