<html>


  <script>
   
   let paymentDone = false;
    function payment()
    {
      if(!paymentDone)
      {
        console.log('Payment done');
        paymentDone = true;
      }
      
    }
    let tranferDone = false;
    function transferMoney()
    {
      if(!tranferDone)
      {

        tranferDone = true;
      }
      
    }
    payment();
    transferMoney();

    payment();
    transferMoney();
  </script>
 
</html>
