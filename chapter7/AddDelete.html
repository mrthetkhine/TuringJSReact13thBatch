<html>


  <script>
 
    let items = [20,30,40];
    items.push(50);
    items.push(60,70);
    console.log('items ',items);

    //delete items[1];
    items.splice(2,1);
    console.log('items ',items);
    for(const item of items)
    {
      console.log('item ',item);
    }

    for(const [index,item] of items.entries())
    {
      console.log('index ',index,' item ',item);
      items[index] = item + 10;
    }
    console.log('items ',items);

    items.forEach(function(item){
      console.log('item foreach',item);
    });
  </script>
 
</html>
