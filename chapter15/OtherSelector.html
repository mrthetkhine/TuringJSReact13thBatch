<html>
    <style>
        .container {
            background-color: lightgreen;
        }
    </style>    
    <body>
        <h1>Dummy</h1>
        <div>
            Another div
        </div>
        <input type="text" name="color"/>
        <div class="container">
            Container div
        </div>
        <form>
            <input type="text" name="color"/>
            <input type="submit" value="Submit"/>
        </form>
    </body>
    
    <script>

        console.log('forms ',document.forms);
    </script>
</html>
