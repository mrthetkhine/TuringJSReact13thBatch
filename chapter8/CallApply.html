  <script>
   
    let obj = {
      name : 'Jack',
      age : 30,
      display(message)
      {
        console.log('Message ',message);
        console.log('Name ',this.name, ' Age ',this.age);
      }
    }
    let obj2 ={

    }
    obj.display('hi');
