<html>


  <script>
 
    function hello()//declration
    {
      console.log('Hello');
      console.log('World');
    }
    
    hello();//invocation,execution,call
    console.log('hi');
    
    hello();

    console.log('Woo');
    hello();
    let fun = function()//function expression
    {
      console.log('I am a function expression');
    }
    fun();//invoking the function expression
  </script>
 
</html>
