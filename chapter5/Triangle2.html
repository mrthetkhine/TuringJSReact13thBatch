<html>


  <script>
   let str;
    
    /*

    ***** i=0 , j < 5, 5-i
    ****  i=1 , j < 4,
    ***   i=2 , j < 3,
    **    i=3 , j < 2,  
    *     i=4 , j < 1,

    */
   for(let i=0;i< 5;i++)
  {
    str ='';
    for(let j=0; j < 5-i ;j++)
    {
        str += '*';
    }
    console.log(str);
  }
  </script>

</html>
