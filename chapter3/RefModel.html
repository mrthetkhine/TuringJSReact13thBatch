<html>
    <script>
        
        let obj = {
            value : 100
        };
        console.log('obj.value ',obj.value);
        let obj2 = obj;//obj2 obj point to same object

        obj.value ++;
        console.log('obj.value ',obj.value);
        console.log('obj2.value ',obj2.value);

        obj2 = {
            value : 200
        };
        obj2.value ++;
        console.log('obj.value ',obj.value);
        console.log('obj2.value ',obj2.value);
    </script>
</html>
