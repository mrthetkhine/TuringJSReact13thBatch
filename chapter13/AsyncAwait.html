<html>
    <body>
        
    </body>
    <script>
        async function fetchTodo(url)
        {
            console.log('fetch');
            let response = await fetch(url);
            let json = await response.json();
            console.log('Todo data fetch',json);
                
        }
        fetchTodo('https://jsonplaceholder.typicode.com/todos/1');
        fetchTodo('https://jsonplaceholder.typicode.com/todos/2');

        function delay(ms)
        {
            return new Promise((resolve,reject)=>setTimeout(resolve,ms));
        }
        async function demo()
        {
            console.log('start');
            await delay(3000);
            console.log('end');
        }
        demo();

        let urls = ['https://jsonplaceholder.typicode.com/todos/1',
                    'https://jsonplaceholder.typicode.com/todos/2',
                    'https://jsonplaceholder.typicode.com/todos/3'];
        
        async function demo2()
        {
            let promises = urls.map(url=>fetch(url)
                                    .then(response=>response.json()));
            for await (let json of promises)
            {
                console.log('json ',json);
            }
        }
        demo2();
    </script>
</html>
