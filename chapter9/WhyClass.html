       class Item
       {
            #price;
            constructor(name,price,qty)
            {
                this.name = name;
                this.#price = price;
                this.qty = qty;
                console.log('Constructor');
            }
            get total()
            {
                //console.log('get total');
                return this.#price * this.qty
            }
            display()
            {
                console.log(`Name ${this.name} Price ${this.#price} Total ${this.total}`)
            }
            static common()
            {
                console.log('Common ',this.name, ' Price ',this.price);
            }
