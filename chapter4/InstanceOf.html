<html>
    <script>
        let obj ={
            value: 100,
            name:'something',
            age : undefined
        }
        console.log('obj instanceof Object ', obj instanceof Object);
        console.log('obj instanceof Array ', obj instanceof Array);
        console.log('obj instanceof String ', obj instanceof String);
        console.log('obj instanceof Date ', obj instanceof Date);
        
        let date =new Date();
        console.log('date instanceof Date ', date instanceof Date);
        console.log('date instanceof Object ', date instanceof Object);
        console.log('null instanceof Object', null instanceof Object);
    </script>    
</html>
